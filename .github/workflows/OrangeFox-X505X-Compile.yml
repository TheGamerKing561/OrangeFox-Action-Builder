name: OrangeFox - Build X505X

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '12.1'
        type: choice
        options: [12.1, 11.0]
      DEVICE_TREE:
        description: 'OrangeFox Device Tree'
        required: true
        default: 'https://github.com/TheGamerKing561/recovery_device_lenovo_X505X-12.1-new/'
      DEVICE_TREE_BRANCH:
        description: 'OrangeFox Device Tree Branch'
        required: true
        default: 'android-12.1-ofox'
      DEVICE_PATH:
        description: 'Specify your Device Path'
        required: true
        default: 'device/lenovo/X505X'
      DEVICE_NAME:
        description: 'Specify your Device Codename'
        required: true
        default: 'X505X'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options: [boot, recovery, vendorboot]

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
                
    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Build Environment
      run: |
        sudo apt update && sudo apt install aria2 git -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh

    - name: Set-up Manifest
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        git clone https://gitlab.com/OrangeFox/sync.git -b master
        cd sync
        ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
        cd "./${{ inputs.DEVICE_PATH }}"
        
        COMMIT_ID=$(git rev-parse HEAD)
        SHORT_COMMIT_ID=$(git rev-parse --short HEAD)
        COMMIT_TITLE=$(git log -1 --pretty=%s)
        
        echo "COMMIT_ID=$COMMIT_ID" >> $GITHUB_ENV
        echo "SHORT_COMMIT_ID=$SHORT_COMMIT_ID" >> $GITHUB_ENV
        echo "COMMIT_TITLE=$COMMIT_TITLE" >> $GITHUB_ENV

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +'%d%m%Y-%H%M')" >> $GITHUB_ENV

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        
        set +e
        source build/envsetup.sh
        set -e
        
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_${{ inputs.DEVICE_NAME }}-eng || { echo "Lunch failed"; exit 1; }
        
        make clean
        
        STD_OUT_DIR="out/target/product/${{ inputs.DEVICE_NAME }}"
        ERR_OUT_DIR="out/target/product/${{ inputs.DEVICE_NAME }}/target/product/${{ inputs.DEVICE_NAME }}"
        DTB_SRC="${{ inputs.DEVICE_PATH }}/prebuilt/dtb.img"
        
        echo "Creating output directories..."
        mkdir -p "$STD_OUT_DIR"
        mkdir -p "$ERR_OUT_DIR"
        
        if [ -f "$DTB_SRC" ]; then
            echo "Injecting DTB into multiple locations to satisfy Ninja..."
            cp "$DTB_SRC" "$STD_OUT_DIR/dtb.img"
            cp "$DTB_SRC" "$ERR_OUT_DIR/dtb.img"
            touch "$STD_OUT_DIR/dtb.img"
            touch "$ERR_OUT_DIR/dtb.img"
            echo "DTB Injection successful."
        else
            echo "::error::dtb.img not found at $DTB_SRC"
            exit 1
        fi
        
        mka adbd ${{ inputs.BUILD_TARGET }}image

    - name: Rename Build Outputs
      run: |
        cd OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}
        
        for f in OrangeFox*.img; do
          [ -e "$f" ] && mv "$f" "${f%.img}-${BUILD_DATE}.img"
        done
        
        for f in OrangeFox*.zip; do
          [ -e "$f" ] && mv "$f" "${f%.zip}-${BUILD_DATE}.zip"
        done

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.img
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.zip
        name: OrangeFox Recovery for ${{ inputs.DEVICE_NAME }} (${{ env.BUILD_DATE }}) (${{ env.SHORT_COMMIT_ID }})
        tag_name: build-${{ env.BUILD_DATE }}
        body: |
          Build: ${{ inputs.MANIFEST_BRANCH }}
          Device: [Device Tree](${{ inputs.DEVICE_TREE }})
          Branch: ${{ inputs.DEVICE_TREE_BRANCH }}
          Commit: [${{ env.COMMIT_ID }}](${{ inputs.DEVICE_TREE }}/commit/${{ env.COMMIT_ID }}) [${{ env.COMMIT_TITLE }}]
          Image Build Target: ${{ inputs.BUILD_TARGET }}
        prerelease: true
